<!DOCTYPE html>
<html>
<head>
    <title>Simple API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .product { border: 1px solid #ccc; margin: 10px; padding: 10px; display: inline-block; width: 200px; }
        .product img { width: 100%; height: 200px; object-fit: cover; }
        #status { padding: 10px; margin: 10px 0; background: #f0f0f0; }
        .error { background: #ffcccc !important; }
        .success { background: #ccffcc !important; }
    </style>
</head>
<body>
    <h1>Simple API Test Page</h1>
    <div id="status">Testing...</div>
    <div id="products"></div>

    <script>
        const statusEl = document.getElementById('status');
        const productsEl = document.getElementById('products');

        async function testAPI() {
            try {
                statusEl.textContent = 'Fetching from http://localhost:5000/api/products?category=sarees...';
                
                const response = await fetch('http://localhost:5000/api/products?category=sarees');
                const data = await response.json();
                
                statusEl.textContent = `SUCCESS! Got ${data.data.length} products`;
                statusEl.className = 'success';
                
                // Display products
                data.data.forEach(product => {
                    const div = document.createElement('div');
                    div.className = 'product';
                    div.innerHTML = `
                        <img src="${product.images[0]}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'">
                        <h3>${product.name}</h3>
                        <p>Rs. ${product.price}</p>
                    `;
                    productsEl.appendChild(div);
                });
            } catch (error) {
                statusEl.textContent = `ERROR: ${error.message}`;
                statusEl.className = 'error';
                console.error('Full error:', error);
            }
        }

        testAPI();
    </script>
</body>
</html>
